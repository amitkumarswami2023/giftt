<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .thankyou-box {
            background: #fff;
            padding: 50px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
        }

        .thankyou-box h1 {
            color: #222;
            margin-bottom: 15px;
        }

        .thankyou-box p {
            color: #666;
            line-height: 1.6;
        }

        .thankyou-box a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: #000;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
        }
    </style>

</head>

<body>

    <div class="thankyou-box">
        <h1>Thank You!</h1>
        <p>Your message has been submitted successfully.</p>

        <a href="index.html">Go Back</a>
    </div>

</body>

</html>
